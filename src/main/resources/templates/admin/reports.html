<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('Manage Reports')}"></head>
<body>
<div th:replace="~{admin/layout :: navbar}"></div>

<div class="container-fluid d-flex">
    <div th:replace="~{admin/layout :: sidebar}"></div>

    <div class="flex-grow-1 p-4">
        <h2>Reported Comments</h2>

        <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Reporter</th>
                <th>Reason</th>
                <th>Target Content</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="report : ${reports}">
                <td th:text="${report.id}"></td>
                <td th:text="${report.user.name}"></td>
                <td th:text="${report.reason}"></td>
                <td>
                    <span th:if="${report.comment != null}" th:text="'Comment: ' + ${report.comment.text}"></span>
                    <span th:if="${report.reply != null}" th:text="'Reply: ' + ${report.reply.text}"></span>
                </td>
                <td>
                    <span th:if="${report.status.name() == 'PENDING'}" class="badge bg-warning text-dark">Pending</span>
                    <span th:if="${report.status.name() == 'RESOLVED'}" class="badge bg-success">Resolved</span>
                    <span th:if="${report.status.name() == 'REJECTED'}" class="badge bg-secondary">Rejected</span>
                </td>
                <td>
                    <div th:if="${report.status.name() == 'PENDING'}" class="btn-group">
                        <form th:action="@{/admin/reports/{id}/resolve(id=${report.id})}" method="post">
                            <button type="submit" class="btn btn-sm btn-success">Approve (Resolve)</button>
                        </form>
                        <form th:action="@{/admin/reports/{id}/reject(id=${report.id})}" method="post" class="ms-1">
                            <button type="submit" class="btn btn-sm btn-outline-secondary">Reject</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
