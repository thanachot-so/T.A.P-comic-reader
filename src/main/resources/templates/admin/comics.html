<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('Manage Comics')}"></head>
<body>
<div th:replace="~{admin/layout :: navbar}"></div>

<div class="container-fluid d-flex">
    <div th:replace="~{admin/layout :: sidebar}"></div>

    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between mb-3">
            <h2>Comics</h2>
            <a href="/admin/comics/new" class="btn btn-primary">Add New Comic</a>
        </div>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Artist</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="comic : ${comics}">
                <td th:text="${comic.id}"></td>
                <td th:text="${comic.title}"></td>
                <td th:text="${comic.author}"></td>
                <td th:text="${comic.artist}"></td>
                <td>
                    <a th:href="@{/admin/comics/{id}/chapters(id=${comic.id})}" class="btn btn-sm btn-info">Manage Chapters</a>
                    <a th:href="@{/admin/comics/{id}/edit(id=${comic.id})}" class="btn btn-sm btn-primary">Edit</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
