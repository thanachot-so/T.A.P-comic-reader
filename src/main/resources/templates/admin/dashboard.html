<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('Admin Dashboard')}"></head>
<body>
<div th:replace="~{admin/layout :: navbar}"></div>

<div class="container-fluid d-flex">
    <div th:replace="~{admin/layout :: sidebar}"></div>

    <div class="flex-grow-1 p-4">
        <h2>Dashboard Summary</h2>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Comics</h5>
                        <h2 class="display-4" th:text="${comicCount}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Registered Users</h5>
                        <h2 class="display-4" th:text="${userCount}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-danger mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Reports</h5>
                        <h2 class="display-4" th:text="${reportCount}">0</h2>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
